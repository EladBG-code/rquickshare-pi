name: Pi target build policy

on:
  push:
    branches: [ "master" ]
  pull_request:

# cancel ongoing jobs:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pi_target_notice:
    runs-on: ubuntu-latest
    steps:
      - name: Raspberry Pi target policy
        run: |
          echo "RQuickShare Pi support is built and tested on real Raspberry Pi OS ARM64 hardware."
          echo "GitHub-hosted x86_64/macOS builds are intentionally not used as support proof for this fork."
