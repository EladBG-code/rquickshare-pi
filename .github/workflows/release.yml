name: Pi Release Checklist

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag Name"
        required: true
  push:
    tags:
      - "*"

jobs:
  pi_release_notice:
    runs-on: ubuntu-latest
    steps:
      - name: Raspberry Pi release policy
        run: |
          echo "Build release artifacts on the Raspberry Pi target with:"
          echo "cd app/main"
          echo "pnpm install --frozen-lockfile"
          echo "pnpm tauri build --bundles deb"
          echo "Upload the ARM64 .deb from app/main/src-tauri/target/release/bundle/deb/."
